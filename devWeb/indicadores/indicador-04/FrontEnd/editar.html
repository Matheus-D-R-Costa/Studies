<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cadastro - Pessoa</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .container {
            backdrop-filter: blur(10px) saturate(150%);
            -webkit-backdrop-filter: blur(10px) saturate(150%);
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px;
        }

        .card {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            color: #333;
        }

        h4 {
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
        }

        label {
            color: #fff;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .form-control::placeholder {
            color: #e3e3e3;
        }

        .form-control:focus {
            border-color: #6a11cb;
            background: rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .btn-primary {
            background: #6a11cb;
            border: none;
        }

        .btn-primary:hover {
            background: #2575fc;
        }

        .btn-outline-secondary {
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-outline-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <section>
            <h4 class="text-center mb-4">Editar Cadastro de Pessoa</h4>
            <div class="card p-4">
                <div class="card-body">
                    <form method="post" id="formulario">
                        <input type="hidden" name="_method" value="PUT">
                        <input type="hidden" id="id" name="id">

                        <div class="row">
                            <!-- Nome -->
                            <div class="mb-3 col-12 col-sm-6">
                                <label for="nome" class="form-label">Nome*</label>
                                <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Carlos"
                                    required>
                            </div>
                            <!-- Email -->
                            <div class="mb-3 col-12 col-sm-6">
                                <label for="email" class="form-label">Email*</label>
                                <input type="text" class="form-control" id="email" name="email"
                                    placeholder="Ex: carlos@crud.com" disabled>
                            </div>
                            <!-- Telefone -->
                            <div class="mb-3 col-12 col-sm-6">
                                <label for="telefone" class="form-label">Telefone*</label>
                                <input type="number" class="form-control" id="telefone" name="telefone"
                                    placeholder="Ex: 48991184120" required>
                            </div>
                            <!-- Endereço -->
                            <div class="mb-3 col-12 col-sm-6">
                                <label for="endereco" class="form-label">Endereço</label>
                                <input type="text" class="form-control" id="endereco" name="endereco"
                                    placeholder="Ex: Rua das Laranjas">
                            </div>
                            <!-- Ativo -->
                            <div class="mb-3 col-12 col-sm-6">
                                <div class="form-check">
                                    <label for="ativo" class="form-check-label">Ativo</label>
                                    <input type="checkbox" class="form-check-input" id="ativo" name="ativo">
                                </div>
                            </div>
                        </div>

                        <div class="text-end">
                            <button type="reset" class="btn btn-outline-secondary me-2"
                                onclick="window.location.href='index.html'">
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-primary">Editar</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <script src="./assets/js/editar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
        </script>

</body>

</html>
